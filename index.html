<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>portfolio-mipresento</title>
    <style>
      *,
      *::before,
      *::after {
        cursor: none;
      }
      tml::-webkit-scrollbar {
        display: none;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
        overflow-x: hidden;
        overflow-y: auto;
        scrollbar-width: none;
        box-sizing: border-box;
        cursor: none;
      }
      #root {
        height: 100vh;
        overflow-x: hidden;
        overflow-y: auto;
        scrollbar-width: none;
        cursor: none;
        position: relative;
        z-index: 1;
      }
      .cursor-dot {
        position: fixed;
        width: 12px;
        height: 12px;
        background: white;
        border-radius: 50%;
        pointer-events: none;
        transform: translate(-50%, -50%);
        z-index: 999;
      }
    </style>
  </head>
  <body>
    <div class="cursor-dot"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
